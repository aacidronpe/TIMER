<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>통계</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: var(--font, 'Segoe UI'), sans-serif;
      -webkit-app-region: drag;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      overflow: hidden;
      color: var(--text, rgba(255,255,255,0.85));
    }
    .panel {
      background: var(--bg, #1a1a1a);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border, rgba(255,255,255,0.08));
      flex-shrink: 0;
    }
    .panel-title { font-size: 13px; font-weight: 700; }
    .close-btn {
      width: 20px; height: 20px; border-radius: 50%;
      background: #e74c3c; border: none; cursor: pointer;
      font-size: 11px; color: #fff;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: no-drag; opacity: 0.8; transition: opacity 0.15s;
    }
    .close-btn:hover { opacity: 1; }
    .summary {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 12px 18px;
      border-bottom: 1px solid var(--border, rgba(255,255,255,0.08));
      flex-shrink: 0;
    }
    .summary-card { background: var(--bg2, #2a2a2a); border-radius: 10px; padding: 10px 14px; }
    .summary-value { font-size: 20px; font-weight: 700; color: var(--accent, #00cc66); }
    .summary-label { font-size: 10px; color: var(--text-muted, rgba(255,255,255,0.4)); margin-top: 2px; }
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border, rgba(255,255,255,0.08));
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .tab-btn {
      flex: 1; padding: 8px 0; font-size: 11px; font-weight: 600;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted, rgba(255,255,255,0.4));
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: var(--accent, #00cc66);
      border-bottom-color: var(--accent, #00cc66);
    }
    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 0 18px 14px; -webkit-app-region: no-drag; }
    .tab-content.active { display: block; }
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-track { background: transparent; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border, rgba(255,255,255,0.1)); border-radius: 2px; }
    .section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--text-muted, rgba(255,255,255,0.4));
      padding: 10px 0 6px;
    }
    .app-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border, rgba(255,255,255,0.04)); }
    .app-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--bg2, #2a2a2a);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--accent, #00cc66);
      flex-shrink: 0; font-weight: 700;
    }
    .app-info { flex: 1; min-width: 0; }
    .app-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-row { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .bar-bg { flex: 1; height: 4px; background: var(--bg2, #2a2a2a); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent, #00cc66); border-radius: 2px; transition: width 0.3s; }
    .app-time { font-size: 10px; color: var(--text-muted, rgba(255,255,255,0.4)); flex-shrink: 0; }
    .app-percent { font-size: 10px; color: var(--text-muted, rgba(255,255,255,0.4)); flex-shrink: 0; width: 28px; text-align: right; }
    .session-item { padding: 10px 0; border-bottom: 1px solid var(--border, rgba(255,255,255,0.04)); }
    .session-duration { font-size: 16px; font-weight: 700; color: var(--accent, #00cc66); }
    .session-meta { font-size: 10px; color: var(--text-muted, rgba(255,255,255,0.4)); margin-top: 3px; display: flex; justify-content: space-between; }
    .empty { text-align: center; padding: 40px 0; color: var(--text-muted, rgba(255,255,255,0.3)); font-size: 12px; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">사용 통계</span>
      <button class="close-btn" onclick="window.api.closeWindow()">✕</button>
    </div>
    <div class="summary">
      <div class="summary-card"><div class="summary-value" id="totalTime">0분</div><div class="summary-label">총 사용 시간</div></div>
      <div class="summary-card"><div class="summary-value" id="sessionCount">0</div><div class="summary-label">완료 세션</div></div>
      <div class="summary-card"><div class="summary-value" id="avgTime">0분</div><div class="summary-label">평균 세션</div></div>
      <div class="summary-card"><div class="summary-value" id="appCount">0</div><div class="summary-label">사용 앱</div></div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('apps', this)">앱별 통계</button>
      <button class="tab-btn" onclick="switchTab('sessions', this)">최근 세션</button>
    </div>
    <div class="tab-content active" id="tab-apps">
      <div class="section-title">애플리케이션별 통계</div>
      <div id="appList"><div class="empty">타이머를 시작하면 통계가 쌓여요</div></div>
    </div>
    <div class="tab-content" id="tab-sessions">
      <div class="section-title">최근 완료 세션</div>
      <div id="sessionList"><div class="empty">완료된 세션이 없어요</div></div>
    </div>
  </div>
  <script>
    function formatTime(sec) {
      const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
      if (h>0) return `${h}시간 ${m}분`;
      if (m>0) return `${m}분`;
      return `${sec}초`;
    }

    function switchTab(name, btn) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab-" + name).classList.add("active");
    }

    async function renderAppList(apps) {
      const appList = document.getElementById("appList");
      if (apps.length === 0) {
        appList.innerHTML = '<div class="empty">타이머를 시작하면 통계가 쌓여요</div>';
        return;
      }
      // 먼저 텍스트로 렌더링
      appList.innerHTML = apps.map((a, i) => `
        <div class="app-item">
          <div class="app-icon" id="icon-${i}">
            <span class="icon-letter">${a.name.charAt(0).toUpperCase()}</span>
          </div>
          <div class="app-info">
            <div class="app-name">${a.name}</div>
            <div class="bar-row">
              <div class="bar-bg"><div class="bar-fill" style="width:${a.percent}%"></div></div>
              <span class="app-time">${formatTime(a.seconds)}</span>
              <span class="app-percent">${a.percent}%</span>
            </div>
          </div>
        </div>`).join("");

      // 아이콘 비동기 로드
      for (let i = 0; i < apps.length; i++) {
        const a = apps[i];
        if (!a.path) continue;
        try {
          const iconData = await window.api.getIcon(a.path);
          if (iconData) {
            const el = document.getElementById(`icon-${i}`);
            if (el) el.innerHTML = `<img src="${iconData}" style="width:24px;height:24px;object-fit:contain;border-radius:4px;" />`;
          }
        } catch (e) {}
      }
    }

    function renderStats(data) {
      document.getElementById("totalTime").textContent = formatTime(data.totalSeconds);
      document.getElementById("sessionCount").textContent = data.sessionCount;
      document.getElementById("avgTime").textContent = formatTime(data.avgSession);
      document.getElementById("appCount").textContent = data.appCount;
      renderAppList(data.apps);

      const sessionList = document.getElementById("sessionList");
      if (!data.recentSessions || data.recentSessions.length === 0) {
        sessionList.innerHTML = '<div class="empty">완료된 세션이 없어요</div>';
      } else {
        sessionList.innerHTML = data.recentSessions.map(s => `
          <div class="session-item">
            <div class="session-duration">${s.durationStr}</div>
            <div class="session-meta">
              <span>${s.dateStr}</span>
              <span>${s.timeRange}</span>
            </div>
          </div>`).join("");
      }
    }

    const themes = {
      dark: { "--bg": "#1a1a1a", "--bg2": "#2a2a2a", "--border": "rgba(255,255,255,0.08)", "--text": "rgba(255,255,255,0.85)", "--text-muted": "rgba(255,255,255,0.4)" },
      light: { "--bg": "#f0f0f0", "--bg2": "#e0e0e0", "--border": "rgba(0,0,0,0.1)", "--text": "rgba(0,0,0,0.85)", "--text-muted": "rgba(0,0,0,0.4)" },
    };
    function hexToRgba(hex, a) {
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }
    function applyTheme(s) {
      const root = document.documentElement;
      const t = themes[s.theme] || themes.dark;
      for (const [k,v] of Object.entries(t)) root.style.setProperty(k,v);
      root.style.setProperty("--accent", s.accentColor||"#00cc66");
      root.style.setProperty("--accent-glow", hexToRgba(s.accentColor||"#00cc66", 0.35));
      document.body.style.fontFamily = s.font || "'Segoe UI', sans-serif";
    }

    window.api.onStatsUpdate(renderStats);
    window.api.onSettingsUpdate(applyTheme);

    (async () => {
      const s = await window.api.getSettings();
      applyTheme(s);
      setTimeout(async () => {
        try {
          const data = await window.api.getStats();
          renderStats(data);
        } catch(e) {
          setTimeout(async () => {
            const data = await window.api.getStats();
            renderStats(data);
          }, 500);
        }
      }, 300);
    })();
  </script>
</body>
</html>
